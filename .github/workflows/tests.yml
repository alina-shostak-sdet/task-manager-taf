name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout TAF
        uses: actions/checkout@v4

      - name: Checkout App
        uses: actions/checkout@v4
        with:
          repository: alina-shostak-sdet/task-manager
          path: task-manager-app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Backend dependencies
        working-directory: task-manager-app/backend
        run: npm install

      - name: Create Backend .env
        working-directory: task-manager-app/backend
        run: |
          echo "PORT=3000" > .env
          echo "JWT_SECRET=test-secret-key" >> .env
          echo "DB_PATH=./database.db" >> .env

      - name: Seed database
        working-directory: task-manager-app/backend
        run: |
          chmod +x node_modules/.bin/ts-node
          ./node_modules/.bin/ts-node src/db/seed.ts

      - name: Start Backend
        working-directory: task-manager-app/backend
        run: |
          chmod +x node_modules/.bin/ts-node-dev
          ./node_modules/.bin/ts-node-dev --respawn --transpile-only src/server.ts &

      - name: Install Frontend dependencies
        working-directory: task-manager-app/frontend
        run: npm install

      - name: Start Frontend
        working-directory: task-manager-app/frontend
        run: npm run dev &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000/api/auth/me \
            http://localhost:5173 \
            --timeout 60000

      - name: Install TAF dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7